version: 1.3.4
cache: true
endpoints:
  custom:
    - name: "AnyGPT"
      apiKey: "${ANYGPT_API_KEY}"
      baseURL: "${ANYGPT_BASE_URL}"
      models:
        default:
          - "gpt-4o-mini"
          - "gpt-5-mini"
          - "gpt-5.4"
          - "gpt-4.1-mini"
          - "gemini-2.5-flash"
          - "gemini-2.5-pro"
          - "deepseek-chat"
          - "deepseek-reasoner"
          - "anthropic/claude-sonnet-4.5"
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      summaryModel: "current_model"
