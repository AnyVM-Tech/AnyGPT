name: CI

on:
    push:
        branches:
            - main
        paths:
            - '.github/workflows/ci.yml'
            - 'apps/api/**'
            - 'apps/langgraph-control-plane/**'
            - 'package.json'
            - 'tsconfig.json'
            - 'bun.lock'
            - 'bun.sh'
    pull_request:
        branches:
            - main
        paths:
            - '.github/workflows/ci.yml'
            - 'apps/api/**'
            - 'apps/langgraph-control-plane/**'
            - 'package.json'
            - 'tsconfig.json'
            - 'bun.lock'
            - 'bun.sh'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Typecheck apps/api
              working-directory: apps/api
              run: bun run typecheck

            - name: Typecheck apps/langgraph-control-plane
              working-directory: apps/langgraph-control-plane
              run: bun run typecheck
